              </div>
              <button onClick={()=>setEditGoal(g=>!g)} style={{ background:`${C.accent}18`,
                border:"none", borderRadius:7, padding:"7px 14px", fontSize:11, fontWeight:700,
                color:C.accent, cursor:"pointer", fontFamily:"'Nunito Sans',sans-serif" }}>
                {editGoal?"Done":"Edit"}
              </button>
            </div>
            {editGoal&&(
              <>
                <input type="range" min={1200} max={4000} step={50} value={calorieGoal}
                  onChange={e=>setCalorieGoal(parseInt(e.target.value))}
                  style={{ width:"100%", accentColor:C.accent, marginBottom:10 }}/>
                <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                  {GOAL_PRESETS.map(p=>(
                    <button key={p} onClick={()=>setCalorieGoal(p)} style={{
                      padding:"5px 11px", borderRadius:6, fontSize:10, fontWeight:700,
                      cursor:"pointer", border:`1px solid ${calorieGoal===p?C.accent:C.border}`,
                      background:calorieGoal===p?`${C.accent}18`:"transparent",
                      color:calorieGoal===p?C.accent:C.muted, fontFamily:"Inter,sans-serif" }}>{p}</button>
                  ))}
                </div>
              </>
            )}
          </div>
          {[{label:"Weight Loss (moderate)",val:"1500–1800 kcal"},
            {label:"Maintenance",val:"1800–2200 kcal"},
            {label:"Active / Athletic",val:"2500–3500 kcal"}].map(g=>(
            <div key={g.label} onClick={()=>setCalorieGoal(parseInt(g.val.split("–")[0].replace(/\D/g,"")))}
              style={{ display:"flex", justifyContent:"space-between", padding:"9px 14px",
                background:C.surface, borderRadius:9, marginBottom:5,
                border:`1px solid ${C.border}`, cursor:"pointer" }}>
              <span style={{ fontSize:12, color:C.text, fontFamily:"Inter,sans-serif" }}>{g.label}</span>
              <span style={{ fontSize:12, fontWeight:700, color:C.accent,
                fontFamily:"'Nunito Sans',sans-serif" }}>{g.val}</span>
            </div>
          ))}
        </div>

        {/* ── HEALTH INTEGRATIONS ── */}
        <HealthIntegrations C={C} calorieGoal={calorieGoal} setCalorieGoal={setCalorieGoal}/>

        {/* ── BUDGET ── */}
        <div style={{ marginBottom:18 }}>
          <SectionHeader title="Weekly Food Budget" accent={C.green}/>
          <div style={{ background:C.surface, borderRadius:12, padding:"14px",
            border:`1px solid ${C.border}`, marginTop:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end",
              marginBottom:editBudget?12:0 }}>
              <div>
                <div style={{ fontSize:9, fontWeight:700, color:C.muted, textTransform:"uppercase",
                  letterSpacing:"0.08em", fontFamily:"Inter,sans-serif", marginBottom:2 }}>Weekly Limit</div>
                <div style={{ fontFamily:"'Nunito Sans',sans-serif", fontWeight:800,
                  fontSize:30, color:C.green, lineHeight:1 }}>£{weeklyBudget}</div>
                <div style={{ fontSize:10, color:C.muted, fontFamily:"Inter,sans-serif" }}>per week</div>
              </div>
              <button onClick={()=>setEditBudget(b=>!b)} style={{ background:`${C.green}18`,
                border:"none", borderRadius:7, padding:"7px 14px", fontSize:11, fontWeight:700,
                color:C.green, cursor:"pointer", fontFamily:"'Nunito Sans',sans-serif" }}>
                {editBudget?"Done":"Edit"}
              </button>
            </div>
            {editBudget&&(
              <input type="range" min={20} max={300} step={5} value={weeklyBudget}
                onChange={e=>setWeeklyBudget(parseInt(e.target.value))}
                style={{ width:"100%", accentColor:C.green }}/>
            )}
          </div>
        </div>

        {/* ── APP SETTINGS ── */}
        <div style={{ marginBottom:18 }}>
          <SectionHeader title="App Settings"/>
          <div style={{ marginTop:10 }}>
            <Row label="Theme">
              <div style={{ display:"flex", gap:5 }}>
                {["dark","light"].map(t=>(
                  <button key={t} onClick={()=>setTheme(t)} style={{
                    padding:"5px 13px", borderRadius:6, border:"none", fontSize:10,
                    fontWeight:700, cursor:"pointer", fontFamily:"'Nunito Sans',sans-serif",
                    background:theme===t?C.accent:C.bgAlt, color:theme===t?"#1C2333":C.muted }}>{t}</button>
                ))}
              </div>
            </Row>
            <Row label="Accent Colour">
              <div style={{ display:"flex", gap:6 }}>
                {[["gold","#FFCB57"],["coral","#FF7B5A"],["sage","#8CCB7E"]].map(([key,col])=>(
                  <button key={key} onClick={()=>setAccentKey(key)} style={{
                    width:26, height:26, borderRadius:"50%",
                    border:`2.5px solid ${accentKey===key?"#FFF":col}`,
                    background:col, cursor:"pointer",
                    outline:accentKey===key?`2px solid ${col}`:"none" }}/>
                ))}
              </div>
            </Row>
            <Row label="Card Style">
              <div style={{ display:"flex", gap:5 }}>
                {[["grid","Grid"],["editorial","Edit."],["compact","List"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setCardStyle(k)} style={{
                    padding:"4px 10px", borderRadius:6,
                    border:`1px solid ${cardStyle===k?C.accent:C.border}`,
                    background:cardStyle===k?`${C.accent}18`:"transparent",
                    color:cardStyle===k?C.accent:C.muted, fontSize:9,
                    fontWeight:700, cursor:"pointer", fontFamily:"Inter,sans-serif" }}>{l}</button>
                ))}
              </div>
            </Row>
          </div>
        </div>

        {/* App footer */}
        <div style={{ padding:"16px", background:C.surface, borderRadius:12,
          border:`1px solid ${C.border}`, textAlign:"center" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8, marginBottom:6 }}>
            <svg width="18" height="22" viewBox="0 0 24 30" fill="none">
              <rect x="1" y="14" width="5" height="13" rx="2.5" fill="#8CCB7E"/>
              <rect x="9.5" y="7" width="5" height="13" rx="2.5" fill="#8CCB7E"/>
              <rect x="18" y="10" width="5" height="10" rx="2.5" fill="#8CCB7E"/>
              <circle cx="12" cy="3" r="2.5" fill="#FFCB57"/>
            </svg>
            <span style={{ fontFamily:"'Nunito Sans',sans-serif", fontWeight:800,
              fontSize:16, color:C.accent, letterSpacing:"-0.01em" }}>mise</span>
          </div>
          <div style={{ fontSize:10, color:C.muted, fontFamily:"Inter,sans-serif" }}>
            Recipe &amp; Nutrition · v0.3 Prototype</div>
          <div style={{ fontSize:10, color:C.muted, fontFamily:"Inter,sans-serif",
            marginTop:2, fontStyle:"italic" }}>Plan meals. Track progress. Live better.</div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { MealPlanScreen, CalorieTrackerScreen, ProfileScreen });


function useTweaks(defaults){
  const [tweaks,setTweaksState]=React.useState(defaults);
  function setTweak(key,val){setTweaksState(t=>({...t,[key]:val}));}
  return [tweaks,setTweak];
}

// ── TWEAKS PANEL ──────────────────────────────────────────────────────────────
function TweaksPanel({children}){
  const [open,setOpen]=React.useState(false);
  return(
    <>
      <button onClick={()=>setOpen(o=>!o)} style={{marginTop:16,padding:"8px 18px",
        background:"rgba(140,203,126,0.15)",border:"1px solid rgba(140,203,126,0.3)",
        borderRadius:20,color:"#8CCB7E",fontSize:11,fontWeight:700,
        letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer"}}>
        {open?"✕ Close":"⚙ Tweaks"}
      </button>
      {open&&(
        <div style={{marginTop:12,background:"#1A2234",border:"1px solid rgba(196,168,74,0.2)",
          borderRadius:16,padding:20,width:390,display:"flex",flexDirection:"column",gap:16}}>
          {children}
        </div>
      )}
    </>
  );
}

function TweakSection({title,children}){
  return(
    <div>
      <div style={{fontSize:9,fontWeight:800,color:"rgba(196,168,74,0.7)",
        letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:10,
        paddingBottom:6,borderBottom:"1px solid rgba(196,168,74,0.1)"}}>{title}</div>
      {children}
    </div>
  );
}

function TweakRadio({label,options,value,onChange}){
  return(
    <div style={{display:"flex",gap:6}}>
      {options.map(opt=>(
        <button key={opt.value} onClick={()=>onChange(opt.value)}
          style={{flex:1,padding:"7px 4px",borderRadius:8,border:"none",cursor:"pointer",
            background:value===opt.value?"rgba(140,203,126,0.18)":"rgba(255,255,255,0.04)",
            color:value===opt.value?"#8CCB7E":"#606775",
            fontSize:11,fontWeight:700,letterSpacing:"0.06em",
            outline:value===opt.value?"1px solid rgba(196,168,74,0.4)":"none"}}>
          {opt.label}
        </button>
      ))}
    </div>
  );
}



// ── NAV CONFIG ────────────────────────────────────────────────────────────────
const NAV=[
  {key:"discover",label:"Discover",icon:"compass"},
  {key:"inventory",label:"Pantry",  icon:"box"},
  {key:"mealplan", label:"Plan",    icon:"calendar"},
  {key:"calories", label:"Track",   icon:"chart"},
  {key:"profile",  label:"Profile", icon:"user"},
];

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [tweaks,setTweak]=useTweaks({theme:"dark",accentKey:"gold",cardStyle:"grid"});
  const theme    =(tweaks&&tweaks.theme)    ||"dark";
  const accentKey=(tweaks&&tweaks.accentKey)||"gold";
  const cardStyle=(tweaks&&tweaks.cardStyle)||"grid";
  const C=React.useMemo(()=>buildColors(theme,accentKey),[theme,accentKey]);

  const [onboarded,setOnboarded]=React.useState(
    ()=>!!localStorage.getItem("mise_onboarded"));

  const [tab,setTab]           =React.useState("discover");
  const [recipe,setRecipe]     =React.useState(null);
  const [customRecipes,setCustomRecipes]=React.useState(
    ()=>JSON.parse(localStorage.getItem("mise_custom_recipes")||"[]"));
  const [calorieGoal,setCalorieGoal]=React.useState(
    ()=>parseInt(localStorage.getItem("mise_cal_goal")||"2000"));
  const [weeklyBudget,setWeeklyBudget]=React.useState(
    ()=>parseInt(localStorage.getItem("mise_budget")||"100"));
  const [inventory,setInventory]=React.useState(
    ()=>JSON.parse(localStorage.getItem("mise_inventory")||"null")||MISE_DATA.defaultInventory);
  const [groceryList,setGroceryList]=React.useState(
    ()=>JSON.parse(localStorage.getItem("mise_grocery")||"[]"));

  React.useEffect(()=>{localStorage.setItem("mise_inventory",JSON.stringify(inventory))},[inventory]);
  React.useEffect(()=>{localStorage.setItem("mise_grocery",JSON.stringify(groceryList))},[groceryList]);
  React.useEffect(()=>{localStorage.setItem("mise_cal_goal",calorieGoal)},[calorieGoal]);
  React.useEffect(()=>{localStorage.setItem("mise_budget",weeklyBudget)},[weeklyBudget]);
  React.useEffect(()=>{
    document.body.style.background=theme==="dark"?"#1C2333":"#F4F5F7";
  },[theme]);

  function handleAddToGrocery(items){
    setGroceryList(gl=>{
      const m=[...gl];
      items.forEach(item=>{if(!m.find(g=>g.name===item.name))m.push({...item,checked:false});});
      return m;
    });
    setTab("inventory");setRecipe(null);
  }

  function renderScreen(){
    if(tab==="discover"){
      if(recipe) return<RecipeDetailScreen recipe={recipe} onBack={()=>setRecipe(null)}
        inventory={inventory} onAddToGrocery={handleAddToGrocery} C={C}/>;
      return<DiscoverScreen onSelectRecipe={r=>setRecipe(r)} inventory={inventory}
        C={C} cardStyle={cardStyle} customRecipes={customRecipes}
        setCustomRecipes={setCustomRecipes}/>;
    }
    if(tab==="inventory") return<InventoryScreen inventory={inventory}
      setInventory={setInventory} groceryList={groceryList}
      setGroceryList={setGroceryList} C={C}/>;
    if(tab==="mealplan")  return<MealPlanScreen inventory={inventory}
      onAddToGrocery={handleAddToGrocery} C={C} weeklyBudget={weeklyBudget}/>;
    if(tab==="calories")  return<CalorieTrackerScreen calorieGoal={calorieGoal} C={C}/>;
    if(tab==="profile")   return<ProfileScreen
      calorieGoal={calorieGoal} setCalorieGoal={setCalorieGoal}
      weeklyBudget={weeklyBudget} setWeeklyBudget={setWeeklyBudget}
      theme={theme}      setTheme={v=>setTweak("theme",v)}
      accentKey={accentKey} setAccentKey={v=>setTweak("accentKey",v)}
      cardStyle={cardStyle}  setCardStyle={v=>setTweak("cardStyle",v)}
      C={C}/>;
  }

  if(!onboarded){
    return(
      <div style={{height:"100dvh",display:"flex",flexDirection:"column",
        background:C.bg,paddingTop:"env(safe-area-inset-top)",
        paddingBottom:"env(safe-area-inset-bottom)"}}>
        <OnboardingScreen calorieGoal={calorieGoal}
          setCalorieGoal={setCalorieGoal}
          onComplete={()=>{
            localStorage.setItem("mise_onboarded","1");
            setOnboarded(true);
          }}
          C={C}/>
      </div>
    );
  }

  return(
    <div style={{height:"100dvh",display:"flex",flexDirection:"column",
      background:C.bg,
      paddingTop:"env(safe-area-inset-top)",
      paddingBottom:"env(safe-area-inset-bottom)"}}>

      <div key={tab+(recipe?.id||"")} style={{flex:1,overflow:"hidden",position:"relative",
        animation:"fadeIn 0.18s ease"}}>
        {renderScreen()}
      </div>

      <div style={{display:"flex",background:C.tabBar,
        borderTop:`1px solid ${C.border}`,paddingTop:8,paddingBottom:10,
        flexShrink:0}}>
        {NAV.map(item=>{
          const active=tab===item.key&&!recipe;
          return(
            <button key={item.key} onClick={()=>{setTab(item.key);setRecipe(null);}}
              style={{flex:1,display:"flex",flexDirection:"column",
                alignItems:"center",gap:3,padding:"2px 0 4px",
                background:"none",border:"none",cursor:"pointer"}}>
              <NavIcon type={item.icon} active={active} C={C}/>
              <span style={{fontSize:9,fontWeight:active?800:500,
                color:active?C.accent:C.muted,fontFamily:"Inter,sans-serif",
                textTransform:"uppercase",letterSpacing:"0.07em"}}>{item.label}</span>
              {active&&<div style={{width:18,height:2,background:C.accent,borderRadius:1}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
