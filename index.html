  cuisines: ["All","Japanese","Korean","Chinese","Thai","Indian","Italian","Mediterranean","French","Mexican","Middle Eastern","South African","American (Soul Food)"],
};

// ── MEAL-TYPE & DIETARY AUGMENTATION ─────────────────────────────────────────
// Tag every recipe with mealTypes (which slots it works for) and dietary flags.
// Generous by default — most savoury dishes work as lunch OR dinner.
// Users can override at the slot level if they want breakfast for dinner.
(function augment() {
  // Hand-curated overrides for recipes whose tags don't fully describe the slot.
  // Keyed by recipe id.
  const OVERRIDES = {
    // Breakfast-friendly
    32: ["breakfast","lunch","dinner"],          // Shakshuka — eggs, brunch
    47: ["breakfast","lunch"],                    // Fried Chicken & Waffles — brunch
    // Light/lunch-leaning
    7:  ["lunch","dinner"],                       // Chirashi Sushi Bowl
    44: ["lunch","dinner"],                       // Som Tum Papaya Salad
    45: ["breakfast","lunch","dinner"],           // Croque Monsieur
    25: ["breakfast","lunch"],                    // Hummus & flatbreads
    // Heavy/dinner-only
    16: ["dinner"],                               // Char Siu Pork — long roast
    23: ["dinner"],                               // Massaman Curry — slow
    25: ["lunch","dinner"],                       // override above takes precedence
    33: ["dinner"],                               // Coq au Vin
    37: ["dinner"],                               // Chicken Enchiladas
    41: ["dinner"],                               // Bobotie
    49: ["dinner"],                               // Birria Tacos
    50: ["dinner"],                               // Lobster Thermidor
  };

  // Tag-based heuristic for everything else.
  function inferMealTypes(r) {
    if (OVERRIDES[r.id]) return OVERRIDES[r.id];
    const tags = (r.tags||[]).map(t => t.toLowerCase());
    const name = r.name.toLowerCase();
    const has = kw => tags.some(t => t.includes(kw)) || name.includes(kw);

    // Strong breakfast signals
    if (has("brunch") || has("eggs") || has("pancake") || has("waffle") || has("porridge") || has("granola") || has("oat"))
      return ["breakfast","lunch","dinner"];

    // Sandwiches / quick lunches
    if (has("sandwich") || has("salad") || has("wrap") || has("toastie"))
      return ["lunch","dinner"];

    // Long-cook / celebration / heavy → dinner only
    if (has("slow cook") || has("braised") || has("celebration") || has("roast") || (r.time && r.time >= 90))
      return ["dinner"];

    // Soups, stews, comfort food → lunch + dinner
    if (has("soup") || has("stew") || has("broth") || has("comfort") || has("curry"))
      return ["lunch","dinner"];

    // Default: lunch + dinner (savoury main)
    return ["lunch","dinner"];
  }

  // Dietary flag inference from ingredient names + tags.
  function inferDietary(r) {
    const ings = (r.ingredients||[]).map(i => i.name.toLowerCase()).join(" | ");
    const tags = (r.tags||[]).map(t => t.toLowerCase());
    const text = ings + " " + tags.join(" ");

    const hasMeat = /\b(chicken|pork|beef|lamb|bacon|ham|sausage|guanciale|lardon|chorizo|prosciutto|prawn|shrimp|fish|salmon|tuna|cod|haddock|anchovy|squid|lobster|crab|seafood|boerewors|chashu)\b/i.test(text);
    const hasDairy = /\b(milk|cream|butter|cheese|yoghurt|yogurt|paneer|gruyere|parmesan|pecorino|feta|mozzarella|cheddar|ghee|sour cream|béchamel|bechamel)\b/i.test(text);
    const hasEgg = /\begg|mayonnaise/i.test(text);
    const hasGluten = /\b(flour|bread|pasta|noodles|spaghetti|gnocchi|panko|breadcrumb|wrapper|tortilla|waffle|biryani|couscous|orzo|udon|ramen|soba)\b/i.test(text);
    const hasHoney = /\bhoney\b/i.test(text);

    return {
      vegetarian: !hasMeat,
      vegan: !hasMeat && !hasDairy && !hasEgg && !hasHoney,
      glutenFree: !hasGluten,
      dairyFree: !hasDairy,
    };
  }

  // Prep-time bucket: quick (≤30) / medium (31–59) / long (60+).
  function prepBucket(r) {
    if (!r.time) return "medium";
    if (r.time <= 30) return "quick";
    if (r.time < 60) return "medium";
    return "long";
  }

  MISE_DATA.recipes.forEach(r => {
    r.mealTypes = inferMealTypes(r);
    r.dietary = inferDietary(r);
    r.prepBucket = prepBucket(r);
  });
})();

function getPantryReadiness(recipe, inventory){
  // inventory may be {fridge:[],pantry:[],freezer:[],spices:[]} (v6) or a flat array
  const items = Array.isArray(inventory)
    ? inventory
    : Object.values(inventory).flat();
  const inv = items.map(i=>i.name.toLowerCase());
  const have = recipe.ingredients.filter(ing=>{
    const n = (ing.name||ing).toLowerCase();
    return inv.some(i=>n.includes(i)||i.includes(n.split(" ")[0]));
  }).length;
  const pct = have/recipe.ingredients.length;
  if(pct>=0.8) return "ready";
  if(pct>=0.5) return "almost";
  return "shop";

function InventoryScreen({inventory,setInventory,groceryList,setGroceryList,C}){
  // v6 inventory: {fridge:[],pantry:[],freezer:[],spices:[]}
  const CAT_KEYS = ["fridge","pantry","freezer","spices"];
  const CAT_LABELS = ["Fridge","Pantry","Freezer","Spices"];
  const [activeIdx,setActiveIdx] = React.useState(0);
  const [showAdd,setShowAdd]     = React.useState(false);
  const [showGrocery,setShowGrocery] = React.useState(false);
  const [newItem,setNewItem]     = React.useState({name:"",amount:"",unit:""});

  const catKey   = CAT_KEYS[activeIdx];
  const catItems = (inventory[catKey]||[]);
  const totalItems = CAT_KEYS.reduce((s,k)=>s+(inventory[k]||[]).length, 0);

  const INP = {padding:"9px 12px",background:C.bgAlt,
    border:`1px solid ${C.border}`,borderRadius:8,color:C.text,
    fontSize:13,outline:"none",width:"100%"};

  function addItem(){
    if(!newItem.name.trim()) return;
    const id = catKey[0] + Date.now();
    setInventory(inv=>({...inv, [catKey]:[...(inv[catKey]||[]), {id, ...newItem}]}));
    setNewItem({name:"",amount:"",unit:""});
    setShowAdd(false);
  }
  function removeItem(id){
    setInventory(inv=>({...inv, [catKey]:(inv[catKey]||[]).filter(i=>i.id!==id)}));
  }
  function moveCheckedToPantry(){
    const bought = groceryList.filter(g=>g.checked);
    if(!bought.length) return;
    setInventory(inv=>({...inv,
      pantry:[...(inv.pantry||[]), ...bought.map(b=>({
        id:"g"+Date.now()+Math.random(), name:b.name,
        amount:b.amount||"1", unit:b.unit||""
      }))]
    }));
    setGroceryList(gl=>gl.filter(g=>!g.checked));
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"16px 16px 0",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:9,fontWeight:800,color:C.accentText,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:2}}>Pantry</div>
            <div style={{fontSize:18,fontWeight:800,color:C.text}}>{totalItems} items</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowGrocery(o=>!o)}
              style={{padding:"7px 12px",background:C.accentMuted,border:`1px solid ${C.accent}44`,
                borderRadius:12,color:C.accent,fontSize:11,fontWeight:700,cursor:"pointer"}}>
              🛒 {groceryList.length}
            </button>
            <button onClick={()=>setShowAdd(o=>!o)}
              style={{padding:"7px 12px",background:C.accent,border:"none",
                borderRadius:12,color:"#1C2333",fontSize:11,fontWeight:800,cursor:"pointer"}}>
              + Add
            </button>
          </div>
        </div>
        {/* Category tabs */}
        <div style={{display:"flex",gap:6,marginBottom:12}}>
          {CAT_LABELS.map((cat,i)=>(
            <button key={cat} onClick={()=>setActiveIdx(i)}
              style={{flex:1,padding:"7px 4px",borderRadius:10,border:"none",cursor:"pointer",
                background:activeIdx===i?C.accentMuted:"transparent",
                color:activeIdx===i?C.accent:C.muted,
                fontSize:10,fontWeight:700,letterSpacing:"0.06em",
                outline:activeIdx===i?`1px solid ${C.accent}44`:"none"}}>
              {cat}
            </button>
          ))}
        </div>
      </div>

      {/* Add form */}
      {showAdd&&(
        <div style={{margin:"0 16px 10px",padding:14,background:C.surface,
          borderRadius:12,border:`1px solid ${C.border}`,flexShrink:0}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <input value={newItem.name} onChange={e=>setNewItem(n=>({...n,name:e.target.value}))}
              placeholder="Item name" style={{...INP,gridColumn:"1/-1"}}/>
            <input value={newItem.amount} onChange={e=>setNewItem(n=>({...n,amount:e.target.value}))}
              placeholder="Amount" style={INP}/>
            <input value={newItem.unit} onChange={e=>setNewItem(n=>({...n,unit:e.target.value}))}
              placeholder="Unit (g, ml…)" style={INP}/>
          </div>
          <button onClick={addItem}
            style={{width:"100%",padding:"10px",background:C.accent,border:"none",
              borderRadius:8,color:"#1C2333",fontSize:12,fontWeight:800,cursor:"pointer"}}>
            Add to {CAT_LABELS[activeIdx]}
          </button>
        </div>
      )}

      {/* Grocery panel */}
      {showGrocery&&(
        <div style={{margin:"0 16px 10px",padding:14,background:C.surface,
          borderRadius:12,border:`1px solid ${C.border}`,flexShrink:0,maxHeight:200,overflowY:"auto"}}>
          <div style={{fontSize:11,fontWeight:800,color:C.accentText,
            letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>Grocery List</div>
          {groceryList.length===0&&<div style={{fontSize:12,color:C.muted}}>Empty</div>}
          {groceryList.map((item,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,
              padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
              <input type="checkbox" checked={item.checked}
                onChange={()=>setGroceryList(gl=>gl.map((g,j)=>j===i?{...g,checked:!g.checked}:g))}/>
              <span style={{fontSize:12,color:item.checked?C.muted:C.text,
                textDecoration:item.checked?"line-through":"none",flex:1}}>
                {item.name}{item.amount?` · ${item.amount}${item.unit?" "+item.unit:""}`:""}</span>
              <button onClick={()=>setGroceryList(gl=>gl.filter((_,j)=>j!==i))}
                style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14}}>×</button>
            </div>
          ))}
          {groceryList.some(g=>g.checked)&&(
            <button onClick={moveCheckedToPantry}
              style={{marginTop:10,width:"100%",padding:"9px",background:C.green,
                border:"none",borderRadius:8,color:"white",fontSize:12,fontWeight:700,cursor:"pointer"}}>
              ✓ Move checked to Pantry
            </button>
          )}
        </div>
      )}

      {/* Items list */}
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
        {catItems.length===0&&(
          <div style={{textAlign:"center",padding:"32px 0",color:C.muted,fontSize:13}}>
            Nothing in {CAT_LABELS[activeIdx]} yet
          </div>
        )}
        {catItems.map(item=>(
          <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,
            padding:"11px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{width:36,height:36,borderRadius:10,background:C.accentMuted,
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>📦</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>{item.name}</div>
              <div style={{fontSize:11,color:C.muted}}>{item.amount} {item.unit}</div>
            </div>
            <button onClick={()=>removeItem(item.id)}
              style={{background:"none",border:"none",color:C.red,cursor:"pointer",
                fontSize:16,padding:"2px 6px"}}>×</button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── ONBOARDING SCREEN ─────────────────────────────────────────────────────────
function OnboardingScreen({ calorieGoal, setCalorieGoal, onComplete, C }) {
  const [step, setStep] = React.useState(0);
  const [goal, setGoal] = React.useState(calorieGoal || 2000);
  const STEPS = [
    { title: "Welcome to mise", subtitle: "Your smart kitchen companion", body: null },
    { title: "Set your calorie goal", subtitle: "You can change this anytime in Profile", body: "calories" },
    { title: "Ready to cook", subtitle: "Let's discover your next meal", body: null },
  ];
  const s = STEPS[step];
  const PRESETS = [1500, 1800, 2000, 2200, 2500, 2800];

  function handleNext() {
    if (step === 1) {
      setCalorieGoal(goal);
      localStorage.setItem("mise_cal_goal", goal);
    }
    if (step < STEPS.length - 1) { setStep(step + 1); }
    else {
      localStorage.setItem("mise_onboarded", "1");
      onComplete();
    }
  }

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%",
      background:C.bg, padding:"40px 28px 32px", alignItems:"center",
      justifyContent:"space-between" }}>

      {/* Logo */}
      <MiseLogo C={C} size="lg" />

      {/* Card */}
      <div style={{ flex:1, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", textAlign:"center",
        gap:16, width:"100%", maxWidth:320 }}>
        {/* Icon bubble */}
        <div style={{ width:80, height:80, borderRadius:24, background:C.accentMuted,
          display:"flex", alignItems:"center", justifyContent:"center", marginBottom:8 }}>
          {step === 0 && <span style={{fontSize:36}}>🍳</span>}
          {step === 1 && <span style={{fontSize:36}}>🎯</span>}
          {step === 2 && <span style={{fontSize:36}}>✨</span>}
        </div>
        <div>
          <div style={{ fontFamily:"'Nunito Sans',sans-serif", fontWeight:900,
            fontSize:26, color:C.text, lineHeight:1.1, marginBottom:8 }}>
            {s.title}
          </div>
          <div style={{ fontSize:14, color:C.muted, lineHeight:1.5 }}>
            {s.subtitle}
          </div>
        </div>
        {/* Calories step */}
        {s.body === "calories" && (
          <div style={{ width:"100%", marginTop:8 }}>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center", marginBottom:16 }}>
              {PRESETS.map(p => (
                <button key={p} onClick={()=>setGoal(p)}
                  style={{ padding:"8px 16px", borderRadius:20,
                    border:`1.5px solid ${goal===p?C.accent:C.border}`,
                    background:goal===p?C.accentMuted:"transparent",
                    color:goal===p?C.accent:C.muted,
                    fontSize:13, fontWeight:700, cursor:"pointer",
                    fontFamily:"Inter,sans-serif", transition:"all 0.15s" }}>
                  {p.toLocaleString()} kcal
                </button>
              ))}
            </div>
            <div style={{ fontSize:12, color:C.muted, textAlign:"center" }}>
              Selected: <strong style={{color:C.accent}}>{goal.toLocaleString()} kcal / day</strong>
            </div>
          </div>
        )}
      </div>

      {/* Progress dots */}
      <div style={{ display:"flex", gap:6, marginBottom:24 }}>
        {STEPS.map((_,i) => (
          <div key={i} style={{ width:i===step?20:6, height:6, borderRadius:3,
            background:i===step?C.accent:C.border,
            transition:"all 0.25s cubic-bezier(0.34,1.56,0.64,1)" }}/>
        ))}
      </div>

      {/* CTA */}
      <button onClick={handleNext}
        style={{ width:"100%", padding:"16px", borderRadius:14,
          background:C.accent, color:"#1C2333",
          fontFamily:"'Nunito Sans',sans-serif", fontWeight:900,
          fontSize:16, border:"none", cursor:"pointer",
          boxShadow:`0 4px 20px ${C.accentMuted}`,
          transition:"transform 0.12s" }}
        onMouseDown={e=>e.currentTarget.style.transform="scale(0.97)"}
        onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}>
        {step < STEPS.length - 1 ? "Continue" : "Start Cooking →"}
      </button>
    </div>
  );
}

// ── MEAL PLAN → TRACKER BRIDGE ───────────────────────────────────────────────
function LogTodayBtn({ plan, C }) {
  const [logged, setLogged] = React.useState(false);

  function logToday() {
    if (!plan || !plan[0]) return;
    const today = plan[0]; // first day = "today"
    const now = new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
    const newEntries = Object.entries(today.meals).map(([mealType, recipe], i) => ({
      id: Date.now() + i,
      meal: mealType,
      name: recipe.name,
      calories: recipe.calories.perServing,
      protein: recipe.macros.protein,
      carbs: recipe.macros.carbs,
      fat: recipe.macros.fat,
      time: now,
    }));
    try {
      const saved = JSON.parse(localStorage.getItem("mise_meal_log")||"null");
      const existing = (saved && saved.date === new Date().toDateString()) ? saved.entries : [];
      localStorage.setItem("mise_meal_log", JSON.stringify({
        date: new Date().toDateString(),
        entries: [...existing, ...newEntries],
      }));
      setLogged(true);
      setTimeout(() => setLogged(false), 3000);
    } catch(e) {}
  }

  if (!plan) return null;
  return (
    <button onClick={logToday} style={{ width:"100%", padding:"13px", marginTop:8,
      borderRadius:10, border:`1.5px solid ${logged?C.green:C.border}`,
      background:logged?`${C.green}18`:"transparent",
      color:logged?C.green:C.muted, fontSize:12, fontWeight:700,
      cursor:"pointer", fontFamily:"Inter,sans-serif",
      display:"flex", alignItems:"center", justifyContent:"center", gap:8,
      transition:"all 0.2s" }}>
      <span>{logged?"✓":"🍽"}</span>
      <span>{logged?"Today's meals logged to Tracker!":"Log today's meals to Tracker"}</span>
    </button>
  );
}

// Smart slot-aware generator with: servings, leftovers→lunch, dietary filters,
// skip-days, variety guard, hard budget cap, prep-time preference, slot overrides.
function MealPlanScreen({ inventory, onAddToGrocery, C, weeklyBudget }) {
  const DAY_NAMES = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const MEALS = ["Breakfast","Lunch","Dinner"];
  const cuisines = MISE_DATA.cuisines.filter(c => c !== "All");

  // Persisted prefs
  const loadPref = (k, d) => { try { const v = JSON.parse(localStorage.getItem("mise_plan_"+k)); return v ?? d; } catch(e) { return d; } };
  const savePref = (k, v) => { try { localStorage.setItem("mise_plan_"+k, JSON.stringify(v)); } catch(e) {} };

  const [days, setDays] = React.useState(() => loadPref("days", 5));
  const [servings, setServings] = React.useState(() => loadPref("servings", 3));
  const [leftovers, setLeftovers] = React.useState(() => loadPref("leftovers", false));
  const [selectedCuisines, setSelectedCuisines] = React.useState([]);
  const [diet, setDiet] = React.useState(() => loadPref("diet", { vegetarian:false, vegan:false, glutenFree:false, dairyFree:false }));
  const [skipDays, setSkipDays] = React.useState({});
  const [prepPref, setPrepPref] = React.useState(() => loadPref("prepPref", "any")); // any | weekday-quick | weekend-project
  const [hardBudget, setHardBudget] = React.useState(() => loadPref("hardBudget", false));

  const [plan, setPlan] = React.useState(null);
  const [generating, setGenerating] = React.useState(false);
  const [genWarning, setGenWarning] = React.useState(null);
  const [showGrocery, setShowGrocery] = React.useState(false);
  const [showCuisineDD, setShowCuisineDD] = React.useState(false);
  const [showFilters, setShowFilters] = React.useState(false);
  const [swapTarget, setSwapTarget] = React.useState(null); // { dayIdx, meal }

  // Persist on change
  React.useEffect(()=>savePref("days", days), [days]);
  React.useEffect(()=>savePref("servings", servings), [servings]);
  React.useEffect(()=>savePref("leftovers", leftovers), [leftovers]);
  React.useEffect(()=>savePref("diet", diet), [diet]);
  React.useEffect(()=>savePref("prepPref", prepPref), [prepPref]);
  React.useEffect(()=>savePref("hardBudget", hardBudget), [hardBudget]);

  const allInvNames = React.useMemo(() => {
    const a = []; Object.values(inventory).forEach(cat => cat.forEach(i => a.push(i.name.toLowerCase()))); return a;
  }, [inventory]);
  function toggleCuisine(c) { setSelectedCuisines(sc => sc.includes(c)?sc.filter(x=>x!==c):[...sc,c]); }
  function toggleSkip(day) { setSkipDays(s => ({...s, [day]: !s[day]})); }
  function toggleDiet(k) { setDiet(d => ({...d, [k]: !d[k]})); }
  function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
  function inInv(name) { return allInvNames.some(inv => name.toLowerCase().split(" ").some(w=>w.length>3&&inv.includes(w))); }

  // Filter recipe pool by current preferences
  function filterPool(slot, dayIdx) {
    let pool = MISE_DATA.recipes.slice();
    // Cuisine
    if (selectedCuisines.length) pool = pool.filter(r => selectedCuisines.includes(r.cuisine));
    // Diet
    if (diet.vegetarian) pool = pool.filter(r => r.dietary?.vegetarian);
    if (diet.vegan) pool = pool.filter(r => r.dietary?.vegan);
    if (diet.glutenFree) pool = pool.filter(r => r.dietary?.glutenFree);
    if (diet.dairyFree) pool = pool.filter(r => r.dietary?.dairyFree);
    // Slot — generous: only filter if recipe explicitly has mealTypes
    if (slot) pool = pool.filter(r => !r.mealTypes || r.mealTypes.includes(slot.toLowerCase()));
    // Prep-time
    if (prepPref === "weekday-quick" && dayIdx !== undefined && dayIdx < 5) {
      pool = pool.filter(r => r.prepBucket === "quick" || r.prepBucket === "medium");
    } else if (prepPref === "weekend-project" && dayIdx !== undefined && dayIdx >= 5) {
      // Encourage longer dishes on weekends — soft preference, don't filter out
    }
    return pool;
  }

  function generatePlan() {
    setGenerating(true);
    setGenWarning(null);
    setTimeout(() => {
      const usedIds = new Set();
      const cuisineHistory = []; // last cuisine per day to avoid repeats
      let runningCost = 0;
      const plan = [];
      let warning = null;

      for (let i = 0; i < days; i++) {
        const day = DAY_NAMES[i];
        if (skipDays[day]) {
          plan.push({ day, skipped: true, meals: {} });
          continue;
        }
        const dayMeals = {};
        let dayCuisine = null;

        for (const slot of MEALS) {
          // Leftovers: lunch on day i (i>0) reuses dinner from day i-1
          if (slot === "Lunch" && leftovers && i > 0) {
            const prev = plan[i-1];
            if (prev && !prev.skipped && prev.meals.Dinner) {
              dayMeals.Lunch = { ...prev.meals.Dinner, _isLeftover: true };
              continue;
            }
          }

          let pool = filterPool(slot, i);
          // Variety guard: avoid recipes already used this week
          let varied = pool.filter(r => !usedIds.has(r.id));
          // Avoid same cuisine twice in a row within a day
          if (dayCuisine) varied = varied.filter(r => r.cuisine !== dayCuisine);
          // Avoid same cuisine as yesterday (soft)
          const yest = cuisineHistory[cuisineHistory.length-1];
          if (yest && varied.length > 3) varied = varied.filter(r => r.cuisine !== yest);

          if (varied.length === 0) varied = pool; // relax if too restrictive
          if (varied.length === 0) {
            // Pool is empty — fall back to all recipes
            varied = MISE_DATA.recipes;
            warning = "Filters too strict — relaxed for some slots.";
          }

          // Hard budget: prefer cheaper picks if we're over
          if (hardBudget && weeklyBudget) {
            const remaining = weeklyBudget - runningCost;
            const slotsLeft = (days - i) * 3 - MEALS.indexOf(slot);
            const targetPerSlot = remaining / Math.max(1, slotsLeft);
            const cheap = varied.filter(r => r.cost.perServing * servings <= targetPerSlot * 1.4);
            if (cheap.length) varied = cheap;
          }

          const chosen = pick(varied);
          dayMeals[slot] = chosen;
          usedIds.add(chosen.id);
          dayCuisine = chosen.cuisine;
          runningCost += chosen.cost.perServing * servings * (slot === "Dinner" && leftovers ? 2 : 1);
        }
        cuisineHistory.push(dayCuisine);
        plan.push({ day, meals: dayMeals });
      }

      if (hardBudget && weeklyBudget && runningCost > weeklyBudget * 1.05) {
        warning = `Couldn't quite hit £${weeklyBudget} budget (£${runningCost.toFixed(2)}). Try fewer days or relax filters.`;
      }

      setPlan(plan);
      setGenWarning(warning);
      setGenerating(false);
    }, 700);
  }

  function openSwap(dayIdx, meal) { setSwapTarget({ dayIdx, meal }); }
  function swapWithRecipe(recipe) {
    if (!swapTarget) return;
    const { dayIdx, meal } = swapTarget;
    setPlan(p => p.map((d,i) => i === dayIdx ? { ...d, meals: { ...d.meals, [meal]: { ...recipe, _isLeftover:false } } } : d));
    setSwapTarget(null);
  }

  // Cost calc respects servings + leftovers (dinner cooks 2x portions)
  const dinnerMultiplier = (m) => (m === "Dinner" && leftovers) ? 2 : 1;
  const planCost = React.useMemo(() => {
    if (!plan) return 0;
    return plan.reduce((t, d) => {
      if (d.skipped) return t;
      return t + Object.entries(d.meals).reduce((dt, [meal, r]) => {
        if (r._isLeftover) return dt; // already paid for via dinner
        return dt + r.cost.perServing * servings * dinnerMultiplier(meal);
      }, 0);
    }, 0);
  }, [plan, servings, leftovers]);

  const needGrocery = React.useMemo(() => {
    if (!plan) return [];
    const needed = {};
    plan.forEach(d => {
      if (d.skipped) return;
      Object.entries(d.meals).forEach(([meal, recipe]) => {
        if (recipe._isLeftover) return; // ingredients already bought via dinner
        const mult = (servings / recipe.servings) * dinnerMultiplier(meal);
        recipe.ingredients.forEach(ing => {
          if (inInv(ing.name)) return;
          const k = ing.name.toLowerCase();
          if (!needed[k]) needed[k] = { ...ing, amount: ing.amount * mult, cost: (ing.cost||0) * mult };
          else { needed[k].amount += ing.amount * mult; needed[k].cost += (ing.cost||0) * mult; }
        });
      });
    });
    return Object.values(needed).map(i => ({ ...i, amount: Math.round(i.amount*10)/10 }));
  }, [plan, servings, leftovers, allInvNames]);

  const planCalories = React.useMemo(() => {
    if (!plan) return 0;
    return plan.reduce((t,d) => {
      if (d.skipped) return t;
      return t + Object.entries(d.meals).reduce((dt,[meal,r]) =>
        dt + r.calories.perServing * servings * (r._isLeftover ? 0 : dinnerMultiplier(meal)), 0);
    }, 0);
  }, [plan, servings, leftovers]);

  const budgetPct = weeklyBudget ? Math.min(planCost/weeklyBudget*100,100) : 0;
  const overBudget = weeklyBudget && planCost > weeklyBudget;
  const activeFilters = (selectedCuisines.length>0?1:0) + Object.values(diet).filter(Boolean).length + (prepPref!=="any"?1:0) + (hardBudget?1:0);

  // Reusable mini-row for cuisine pill, diet chip, etc.
  const Chip = ({ label, on, onClick, color = C.green }) => (
    <button onClick={onClick} style={{ padding:"6px 11px", borderRadius:14,
      border:`1.5px solid ${on?color:C.border}`, background:on?`${color}22`:"transparent",
      fontSize:11, fontWeight:700, color:on?color:C.muted, cursor:"pointer",
      fontFamily:"Inter,sans-serif", whiteSpace:"nowrap" }}>{label}</button>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      {/* HEADER */}
      <div style={{ padding:"16px 18px 12px", background:C.bgAlt, borderBottom:`1px solid ${C.border}` }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:2 }}>
          <div style={{ fontFamily:"'Nunito Sans',sans-serif", fontWeight:800, fontSize:22, color:C.text }}>Meal Plan</div>
          <button onClick={()=>setShowFilters(true)} style={{ background:"transparent",
            border:`1px solid ${activeFilters?C.green:C.border}`, borderRadius:8, padding:"5px 10px",
            fontSize:10, fontWeight:700, color:activeFilters?C.green:C.muted, cursor:"pointer",
            fontFamily:"Inter,sans-serif", textTransform:"uppercase", letterSpacing:"0.08em" }}>
            ⚙ Filters{activeFilters?` · ${activeFilters}`:""}
          </button>
        </div>
        <div style={{ height:2, background:C.green, width:28, marginBottom:12 }}/>

        {/* Servings + leftovers row */}
        <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, background:C.surface,
            borderRadius:10, padding:"4px 8px", border:`1.5px solid ${C.border}` }}>
            <span style={{ fontSize:10, fontWeight:700, color:C.muted, fontFamily:"Inter,sans-serif",
              textTransform:"uppercase", letterSpacing:"0.07em" }}>Cooking for</span>
            <button onClick={()=>setServings(s=>Math.max(1,s-1))} style={{ width:22, height:22, borderRadius:5,
              background:C.bgAlt, border:"none", color:C.text, fontSize:14, fontWeight:800, cursor:"pointer" }}>−</button>
            <span style={{ fontSize:14, fontWeight:800, color:C.accent, fontFamily:"'Nunito Sans',sans-serif",
              minWidth:18, textAlign:"center" }}>{servings}</span>
            <button onClick={()=>setServings(s=>Math.min(8,s+1))} style={{ width:22, height:22, borderRadius:5,
              background:C.bgAlt, border:"none", color:C.text, fontSize:14, fontWeight:800, cursor:"pointer" }}>+</button>
          </div>
          <Chip label={leftovers?"✓ Leftovers→Lunch":"+ Leftovers"} on={leftovers}
            onClick={()=>setLeftovers(v=>!v)} color={C.accent}/>
        </div>

        {/* Days + generate row */}
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <span style={{ fontSize:11, fontWeight:700, color:C.muted, fontFamily:"Inter,sans-serif", flexShrink:0 }}>Days</span>
          {[3,5,7].map(d=>(
            <button key={d} onClick={()=>setDays(d)} style={{ width:32, height:32, borderRadius:8,
              fontFamily:"'Nunito Sans',sans-serif", background:days===d?C.accent:"transparent",
              color:days===d?"#1C2333":C.muted, fontSize:13, fontWeight:800, cursor:"pointer",
              border:days===d?"none":`1px solid ${C.border}` }}>{d}</button>
          ))}
          <button onClick={generatePlan} disabled={generating} style={{ flex:1, padding:"9px", borderRadius:9,
            background:generating?C.border:C.accent, border:"none", color:generating?C.muted:"#1C2333",
            fontSize:12, fontWeight:800, fontFamily:"'Nunito Sans',sans-serif", cursor:generating?"default":"pointer" }}>
            {generating?"Building…":plan?"Regenerate":"Generate Plan"}
          </button>
        </div>

        {plan && weeklyBudget > 0 && (
          <div style={{ marginTop:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
              <span style={{ fontSize:10, fontWeight:700, color:C.muted, fontFamily:"Inter,sans-serif",
                textTransform:"uppercase", letterSpacing:"0.08em" }}>Weekly Est.</span>
              <span style={{ fontSize:11, fontWeight:800, fontFamily:"'Nunito Sans',sans-serif",
                color:overBudget?C.red:C.green }}>£{planCost.toFixed(2)} / £{weeklyBudget}</span>
            </div>
            <div style={{ height:4, background:C.border, borderRadius:2 }}>
              <div style={{ height:"100%", borderRadius:2, transition:"width 0.5s",
                background:overBudget?C.red:C.green, width:`${budgetPct}%` }}/>
            </div>
          </div>
        )}
      </div>

      {/* BODY */}
      <div style={{ flex:1, overflowY:"auto", padding:"12px 18px 24px" }}>
        {!plan&&!generating&&(
          <div style={{ textAlign:"center", padding:"48px 16px" }}>
            <div style={{ fontSize:40, marginBottom:12, opacity:0.3 }}>📅</div>
            <div style={{ fontFamily:"'Nunito Sans',sans-serif", fontWeight:800, fontSize:17, color:C.text, marginBottom:8 }}>Plan Your Week</div>
            <div style={{ fontSize:13, color:C.muted, lineHeight:1.7, fontFamily:"Inter,sans-serif" }}>
              Set servings, pick days, tap Generate.<br/>Use Filters to narrow cuisines, diet, prep-time.
            </div>
          </div>
        )}
        {generating&&(<div style={{ textAlign:"center", padding:"60px 20px" }}>
          <div style={{ fontSize:12, color:C.muted, textTransform:"uppercase", letterSpacing:"0.1em", fontFamily:"Inter,sans-serif" }}>Building your plan…</div>
        </div>)}
        {plan&&!generating&&(
          <>
            {genWarning && (
              <div style={{ background:`${C.yellow}22`, border:`1px solid ${C.yellow}66`,
                borderRadius:9, padding:"8px 12px", marginBottom:12, fontSize:11, color:C.yellowText,
                fontFamily:"Inter,sans-serif", lineHeight:1.5 }}>⚠ {genWarning}</div>
            )}
            <div style={{ display:"flex", gap:8, marginBottom:16 }}>
              {[{label:"Est. Cost",val:`£${planCost.toFixed(2)}`,color:C.accent},
                {label:"Total Kcal",val:planCalories.toLocaleString(),color:C.green},
                {label:"To Buy",val:`${needGrocery.length} items`,color:C.muted}].map(s=>(
                <div key={s.label} style={{ flex:1, background:C.surface, borderRadius:10,
                  padding:"10px", border:`1px solid ${C.border}` }}>
                  <div style={{ fontSize:15, fontWeight:800, color:s.color, fontFamily:"'Nunito Sans',sans-serif" }}>{s.val}</div>
                  <div style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:"0.07em", marginTop:2, fontFamily:"Inter,sans-serif" }}>{s.label}</div>
                </div>
              ))}
            </div>
            {plan.map((dayPlan,dayIdx)=>(
              <div key={dayPlan.day} style={{ marginBottom:12, opacity:dayPlan.skipped?0.4:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                  <div style={{ fontSize:11, fontWeight:800, color:C.muted, textTransform:"uppercase",
                    letterSpacing:"0.1em", fontFamily:"Inter,sans-serif" }}>
                    {dayPlan.day}{dayPlan.skipped?" · Skipped":""} <span style={{ fontWeight:500 }}>
                      {dayPlan.skipped?"":`${Object.entries(dayPlan.meals).reduce((a,[m,r])=>a+r.calories.perServing*servings*(r._isLeftover?0:dinnerMultiplier(m)),0)} kcal`}</span>
                  </div>
                  <button onClick={()=>{ toggleSkip(dayPlan.day); setPlan(p=>p.map((d,i)=>i===dayIdx?{...d,skipped:!d.skipped,meals:d.skipped?d.meals:{}}:d)); }}
                    style={{ background:"transparent", border:"none", fontSize:10, fontWeight:700,
                      color:C.muted, cursor:"pointer", fontFamily:"Inter,sans-serif",
                      textTransform:"uppercase", letterSpacing:"0.07em" }}>
                    {dayPlan.skipped?"Restore":"Skip day"}
                  </button>
                </div>
                {!dayPlan.skipped && MEALS.map(meal=>{
                  const recipe = dayPlan.meals[meal];
                  if (!recipe) return null;
                  const isLeftover = recipe._isLeftover;
                  const mult = dinnerMultiplier(meal);
                  return (
                    <div key={meal} style={{ background:C.surface, borderRadius:10, padding:"10px 12px",
                      marginBottom:5, border:`1px solid ${isLeftover?C.accent+"66":C.border}`,
                      display:"flex", alignItems:"center", gap:10 }}>
                      <div style={{ width:38, height:38, borderRadius:8, flexShrink:0, position:"relative",
                        background:`linear-gradient(135deg,${recipe.imageBg}CC,${recipe.imageBg}55)` }}>
                        {isLeftover && <div style={{ position:"absolute", top:-4, right:-4,
                          background:C.accent, color:"#1C2333", fontSize:8, fontWeight:800,
                          padding:"2px 4px", borderRadius:4, fontFamily:"Inter,sans-serif" }}>♻</div>}
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:9, fontWeight:700, color:isLeftover?C.accent:C.muted,
                          textTransform:"uppercase", letterSpacing:"0.08em", fontFamily:"Inter,sans-serif" }}>
                          {meal}{isLeftover?" · Leftovers":mult>1?" · Cook 2×":""}
                        </div>
                        <div style={{ fontSize:12, fontWeight:700, color:C.text,
                          whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                          fontFamily:"'Nunito Sans',sans-serif" }}>{recipe.name}</div>
                        <div style={{ fontSize:10, color:C.muted, fontFamily:"Inter,sans-serif" }}>
                          {recipe.calories.perServing} kcal · £{(recipe.cost.perServing*servings*(isLeftover?0:mult)).toFixed(2)} {isLeftover?"(free)":`/ ${servings}p`}</div>
                      </div>
                      {!isLeftover && (
                        <button onClick={()=>openSwap(dayIdx,meal)} style={{ background:C.bgAlt, border:"none",
                          borderRadius:6, padding:"6px 9px", fontSize:13, cursor:"pointer", color:C.muted }}>↺</button>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
            <LogTodayBtn plan={plan} C={C}/>
            {needGrocery.length > 0 && (
              <button onClick={()=>setShowGrocery(true)} style={{ width:"100%", padding:"14px",
                borderRadius:10, background:C.accent, border:"none", color:"#1C2333",
                fontSize:13, fontWeight:800, fontFamily:"'Nunito Sans',sans-serif", cursor:"pointer", marginTop:4 }}>
                View Grocery List ({needGrocery.length} items)
              </button>
            )}
          </>
        )}
      </div>

      {/* FILTERS MODAL */}
      <Modal open={showFilters} onClose={()=>setShowFilters(false)} title="Plan Filters" C={C}>
        {/* Cuisine */}
        <div style={{ fontSize:10, fontWeight:700, color:C.muted, fontFamily:"Inter,sans-serif",
          textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8 }}>Cuisine</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:16 }}>
          {cuisines.map(c => <Chip key={c} label={c} on={selectedCuisines.includes(c)} onClick={()=>toggleCuisine(c)}/>)}
        </div>

        {/* Diet */}
        <div style={{ fontSize:10, fontWeight:700, color:C.muted, fontFamily:"Inter,sans-serif",
          textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8 }}>Dietary</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:16 }}>
          {[["vegetarian","Vegetarian"],["vegan","Vegan"],["glutenFree","Gluten-free"],["dairyFree","Dairy-free"]].map(([k,l]) =>
            <Chip key={k} label={l} on={diet[k]} onClick={()=>toggleDiet(k)} color={C.green}/>
          )}
        </div>

        {/* Prep time */}
        <div style={{ fontSize:10, fontWeight:700, color:C.muted, fontFamily:"Inter,sans-serif",
          textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8 }}>Prep-time preference</div>
        <div style={{ display:"flex", gap:6, marginBottom:16 }}>
          {[["any","Any time"],["weekday-quick","Weekday quick"],["weekend-project","Weekend project"]].map(([k,l]) =>
            <Chip key={k} label={l} on={prepPref===k} onClick={()=>setPrepPref(k)} color={C.accent}/>
          )}
        </div>

        {/* Hard budget */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
          padding:"10px 0", borderTop:`1px solid ${C.border}`, marginBottom:8 }}>
          <div>
            <div style={{ fontSize:13, fontWeight:700, color:C.text, fontFamily:"'Nunito Sans',sans-serif" }}>Hard budget cap</div>
            <div style={{ fontSize:10, color:C.muted, fontFamily:"Inter,sans-serif", marginTop:2 }}>
              Prefer cheaper recipes when over budget
            </div>
          </div>
          <button onClick={()=>setHardBudget(v=>!v)} style={{ width:42, height:24, borderRadius:12,
            background:hardBudget?C.green:C.border, border:"none", cursor:"pointer", position:"relative",
            transition:"background 0.2s" }}>
            <div style={{ width:18, height:18, borderRadius:9, background:"#fff",
              position:"absolute", top:3, left:hardBudget?21:3, transition:"left 0.2s" }}/>
          </button>
        </div>

        <Btn onClick={()=>setShowFilters(false)} C={C} style={{ width:"100%", marginTop:12 }}>Done</Btn>
      </Modal>

      {/* SLOT SWAP MODAL */}
      <Modal open={!!swapTarget} onClose={()=>setSwapTarget(null)}
        title={swapTarget?`Swap ${swapTarget.meal}`:""} C={C}>
        <div style={{ fontSize:11, color:C.muted, fontFamily:"Inter,sans-serif", marginBottom:10, lineHeight:1.5 }}>
          Recipes that fit this slot. Tap any to swap. <em>Or pick from "Any recipe" below to override the meal-type rule</em>.
        </div>
        {swapTarget && (() => {
          const slotPool = filterPool(swapTarget.meal, swapTarget.dayIdx).filter(r => r.id !== plan[swapTarget.dayIdx].meals[swapTarget.meal]?.id);
          const allPool = MISE_DATA.recipes.filter(r => r.id !== plan[swapTarget.dayIdx].meals[swapTarget.meal]?.id);
          return (
            <>
              <div style={{ fontSize:10, fontWeight:700, color:C.muted, fontFamily:"Inter,sans-serif",
                textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:6 }}>Suggested ({slotPool.length})</div>
              <div style={{ maxHeight:200, overflowY:"auto", marginBottom:14 }}>
                {slotPool.slice(0, 30).map(r => (
                  <div key={r.id} onClick={()=>swapWithRecipe(r)} style={{ padding:"8px 10px",
                    borderBottom:`1px solid ${C.border}`, cursor:"pointer", display:"flex", gap:10, alignItems:"center" }}>
                    <div style={{ width:30, height:30, borderRadius:6, flexShrink:0,
                      background:`linear-gradient(135deg,${r.imageBg}CC,${r.imageBg}55)` }}/>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:12, fontWeight:700, color:C.text, fontFamily:"'Nunito Sans',sans-serif",
                        whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{r.name}</div>
                      <div style={{ fontSize:10, color:C.muted, fontFamily:"Inter,sans-serif" }}>
                        {r.cuisine} · {r.time}min · £{r.cost.perServing.toFixed(2)}/serv</div>
                    </div>
                  </div>
                ))}
              </div>
              <details style={{ marginBottom:8 }}>
                <summary style={{ fontSize:11, fontWeight:700, color:C.accent, cursor:"pointer",
                  fontFamily:"Inter,sans-serif", textTransform:"uppercase", letterSpacing:"0.08em" }}>
                  Any recipe (override slot rule)
                </summary>
                <div style={{ maxHeight:200, overflowY:"auto", marginTop:8 }}>
                  {allPool.map(r => (
                    <div key={r.id} onClick={()=>swapWithRecipe(r)} style={{ padding:"6px 10px",
                      borderBottom:`1px solid ${C.border}`, cursor:"pointer", display:"flex", gap:8, alignItems:"center" }}>
                      <span style={{ fontSize:11, color:C.text, fontFamily:"Inter,sans-serif", flex:1 }}>{r.name}</span>
                      <span style={{ fontSize:9, color:C.muted, fontFamily:"Inter,sans-serif" }}>{r.cuisine}</span>
                    </div>
                  ))}
                </div>
              </details>
            </>
          );
        })()}
      </Modal>

      {/* GROCERY MODAL */}
      <Modal open={showGrocery} onClose={()=>setShowGrocery(false)} title={`Grocery List · ${servings} ppl`} C={C}>
        {needGrocery.map((item,i)=>(
          <div key={i} style={{ display:"flex", alignItems:"center", gap:12,
            padding:"8px 0", borderBottom:`1px solid ${C.border}` }}>
            <span style={{ flex:1, fontSize:13, color:C.text, fontFamily:"Inter,sans-serif" }}>{item.name}</span>
            <span style={{ fontSize:11, color:C.muted }}>{item.amount} {item.unit}</span>
            {item.cost&&<span style={{ fontSize:11, fontWeight:700, color:C.accent,
              fontFamily:"'Nunito Sans',sans-serif" }}>£{item.cost.toFixed(2)}</span>}
          </div>
        ))}
        <div style={{ marginTop:12, padding:"10px 14px", background:`${C.accent}18`,
          borderRadius:9, display:"flex", justifyContent:"space-between",
          alignItems:"center", marginBottom:14 }}>
          <span style={{ fontSize:11, fontWeight:700, color:C.muted, fontFamily:"Inter,sans-serif",
            textTransform:"uppercase", letterSpacing:"0.06em" }}>Est. Grocery Cost</span>
          <span style={{ fontSize:16, fontWeight:800, color:C.accent,
            fontFamily:"'Nunito Sans',sans-serif" }}>£{needGrocery.reduce((a,i)=>a+(i.cost||0),0).toFixed(2)}</span>
        </div>
        <Btn onClick={()=>{onAddToGrocery(needGrocery);setShowGrocery(false);}} C={C} style={{ width:"100%" }}>
          Save to Grocery List
        </Btn>
      </Modal>
    </div>
  );
}

// ── WEEK CALORIE CHART ────────────────────────────────────────────────────────
function WeekChart({ weekData, goal, C }) {
  const chartH = 108;
  const chartW = 272;
  const barW   = 26;
  const gap    = 13;
  const maxKcal = Math.max(goal * 1.25, ...weekData.map(d => d.kcal || 0));
  const totalW = 7 * (barW + gap) - gap;
  const offsetX = (chartW - totalW) / 2;
  const goalY = chartH - (goal / maxKcal * chartH);

  return (
    <div style={{ position:"relative" }}>
      <svg width={chartW} height={chartH + 28} style={{ display:"block", margin:"0 auto" }}>
        {/* Goal dashed line */}
        <line x1={0} y1={goalY} x2={chartW} y2={goalY}
          stroke={C.accent} strokeWidth="1.5" strokeDasharray="4 3" opacity="0.55"/>
        <text x={chartW - 2} y={goalY - 4} textAnchor="end"
          fontSize="8" fill={C.accent} fontFamily="Inter,sans-serif" opacity="0.8">
          goal
        </text>

        {weekData.map((d, i) => {
          const x = offsetX + i * (barW + gap);
          const isToday = i === weekData.length - 1;
          const barH = d.kcal ? Math.max(4, d.kcal / maxKcal * chartH) : 0;
          const barY = chartH - barH;
          const isOver = d.kcal > goal;
          const col = isToday ? C.accent : isOver ? C.red : C.green;
          return (
            <g key={i}>
              {/* Bar background */}
              <rect x={x} y={0} width={barW} height={chartH}
                rx="4" fill={C.border} opacity="0.25"/>
              {/* Data bar */}
              {d.kcal > 0 && (
                <rect x={x} y={barY} width={barW} height={barH}
                  rx="4" fill={col} opacity={isToday ? 1 : 0.72}/>
              )}
              {/* Empty placeholder */}
              {!d.kcal && (
                <rect x={x + barW/2 - 1} y={chartH - 8} width="2" height="8"
                  rx="1" fill={C.muted} opacity="0.3"/>
              )}
              {/* Kcal label (only today + bars near goal) */}
              {d.kcal > 0 && (
                <text x={x + barW/2} y={Math.max(barY - 4, 10)}
                  textAnchor="middle" fontSize="8"
                  fill={col} fontFamily="'Nunito Sans',sans-serif" fontWeight="700"
                  opacity={isToday ? 1 : 0.7}>
                  {d.kcal >= 1000 ? `${(d.kcal/1000).toFixed(1)}k` : d.kcal}
                </text>
              )}
              {/* Day label */}
              <text x={x + barW/2} y={chartH + 18}
                textAnchor="middle" fontSize="10"
                fill={isToday ? C.text : C.muted}
                fontFamily="Inter,sans-serif" fontWeight={isToday ? "700" : "400"}>
                {d.day}
              </text>
              {/* Today dot */}
              {isToday && (
                <circle cx={x + barW/2} cy={chartH + 25} r="2.5" fill={C.accent}/>
              )}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

// ── TRENDS VIEW ──────────────────────────────────────────────────────────────
function TrendsView({ goal, C }) {
  // Simulated 4-week history
  const WEEKS = [
    { label:"3 wks ago", kcal:13840, spend:72.40, cuisines:{Japanese:3,Italian:4,Indian:4,Mexican:3,Thai:3} },
    { label:"2 wks ago", kcal:15120, spend:84.20, cuisines:{Japanese:2,Italian:5,Chinese:3,Indian:3,Mediterranean:4} },
    { label:"Last week", kcal:14380, spend:68.90, cuisines:{Korean:4,Japanese:3,Italian:4,French:2,Thai:4} },
    { label:"This week", kcal:11260, spend:51.60, cuisines:{Japanese:2,Italian:2,Indian:2,Mexican:1,Korean:1}, partial:true },
  ];

  const weekGoal = goal * 7;
  const maxKcal  = Math.max(weekGoal * 1.2, ...WEEKS.map(w=>w.kcal));
  const maxSpend = Math.max(...WEEKS.map(w=>w.spend)) * 1.25;
  const chartH   = 90;
  const barW     = 48;
  const gap      = 16;
  const totalW   = 4*(barW+gap)-gap; // 252
  const offsetX  = (290-totalW)/2;

  // Cuisine frequency aggregation
  const cuisineFreq = {};
  WEEKS.forEach(w=>Object.entries(w.cuisines).forEach(([c,n])=>{
    cuisineFreq[c]=(cuisineFreq[c]||0)+n;
  }));
  const topCuisines = Object.entries(cuisineFreq)
    .sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxFreq = topCuisines[0]?.[1] || 1;

  return (
    <div>
      {/* ── 4-week calorie trend ── */}
      <div style={{ background:C.surface, borderRadius:12, padding:"16px 14px",
        border:`1px solid ${C.border}`, marginBottom:12 }}>
        <div style={{ display:"flex", justifyContent:"space-between",
          alignItems:"center", marginBottom:14 }}>
          <span style={{ fontSize:11, fontWeight:700, color:C.muted,
            textTransform:"uppercase", letterSpacing:"0.08em",
            fontFamily:"Inter,sans-serif" }}>4-Week Calories</span>
          <span style={{ fontSize:10, color:C.muted, fontFamily:"Inter,sans-serif" }}>
            — weekly goal</span>
        </div>
        <svg width="290" height={chartH+32} style={{ display:"block", margin:"0 auto" }}>
          {/* Goal line */}
          {(() => {
            const goalY = chartH - (weekGoal/maxKcal*chartH);
            return <>
              <line x1={0} y1={goalY} x2={290} y2={goalY}
                stroke={C.accent} strokeWidth="1.5" strokeDasharray="4 3" opacity="0.55"/>
              <text x={288} y={goalY-4} textAnchor="end" fontSize="8"
                fill={C.accent} fontFamily="Inter,sans-serif" opacity="0.8">goal</text>
            </>;
          })()}
          {WEEKS.map((w,i)=>{
            const x    = offsetX + i*(barW+gap);
            const barH = Math.max(4, w.kcal/maxKcal*chartH);
            const barY = chartH - barH;
            const isNow = i === 3;
            const isOver = w.kcal > weekGoal;
            const col  = isNow ? C.accent : isOver ? C.red : C.green;
            const avg  = Math.round(w.kcal / (isNow?4:7));
            return (
              <g key={i}>
                <rect x={x} y={0} width={barW} height={chartH} rx="4"
                  fill={C.border} opacity="0.2"/>
                <rect x={x} y={barY} width={barW} height={barH} rx="4"
                  fill={col} opacity={isNow?1:0.7}/>
                {w.partial && (
                  <rect x={x} y={barY-2} width={barW} height={3} rx="1.5"
                    fill={col} opacity="0.5"/>
                )}
                <text x={x+barW/2} y={Math.max(barY-5,10)} textAnchor="middle"
                  fontSize="9" fill={col} fontFamily="'Nunito Sans',sans-serif"
                  fontWeight="700" opacity={isNow?1:0.75}>
                  {Math.round(w.kcal/1000)}k
                </text>
                <text x={x+barW/2} y={chartH+14} textAnchor="middle" fontSize="9"
                  fill={isNow?C.text:C.muted} fontFamily="Inter,sans-serif"
                  fontWeight={isNow?"700":"400"}>
                  {isNow?"Now":w.label.replace(" wks ago","w").replace("Last week","Last")}
                </text>
                <text x={x+barW/2} y={chartH+26} textAnchor="middle" fontSize="8"
                  fill={C.muted} fontFamily="Inter,sans-serif">
                  {avg}/day
                </text>
                {isNow && <circle cx={x+barW/2} cy={chartH+30} r="2.5" fill={C.accent}/>}
              </g>
            );
          })}
        </svg>
      </div>

      {/* ── Grocery spend trend ── */}
      <div style={{ background:C.surface, borderRadius:12, padding:"14px",
        border:`1px solid ${C.border}`, marginBottom:12 }}>
        <div style={{ fontSize:11, fontWeight:700, color:C.muted,
          textTransform:"uppercase", letterSpacing:"0.08em",
          fontFamily:"Inter,sans-serif", marginBottom:12 }}>Weekly Grocery Spend</div>
        {WEEKS.map((w,i)=>{
          const isNow = i===3;
          const pct   = w.spend/maxSpend*100;
          const col   = isNow?C.accent:C.green;
          return (
            <div key={i} style={{ marginBottom:i<3?10:0 }}>
              <div style={{ display:"flex", justifyContent:"space-between",
                marginBottom:4 }}>
                <span style={{ fontSize:11, color:isNow?C.text:C.muted,
                  fontFamily:"Inter,sans-serif",
                  fontWeight:isNow?700:400 }}>
                  {isNow?"This week":w.label}{w.partial?" (partial)":""}
                </span>
                <span style={{ fontSize:11, fontWeight:700, color:col,
                  fontFamily:"'Nunito Sans',sans-serif" }}>
                  £{w.spend.toFixed(2)}
                </span>
              </div>
              <div style={{ height:6, background:C.border, borderRadius:3 }}>
                <div style={{ height:"100%", background:col, borderRadius:3,
                  width:`${pct}%`, opacity:isNow?1:0.65,
                  transition:"width 0.5s ease" }}/>
              </div>
            </div>
          );
        })}
        <div style={{ marginTop:12, padding:"10px 12px",
          background:`${C.green}12`, borderRadius:8,
          border:`1px solid ${C.green}33`,
          display:"flex", justifyContent:"space-between" }}>
          <span style={{ fontSize:11, color:C.muted, fontFamily:"Inter,sans-serif" }}>
            4-week avg</span>
          <span style={{ fontSize:12, fontWeight:800, color:C.green,
            fontFamily:"'Nunito Sans',sans-serif" }}>
            £{(WEEKS.reduce((a,w)=>a+w.spend,0)/4).toFixed(2)}/wk
          </span>
        </div>
      </div>

      {/* ── Cuisine frequency ── */}
      <div style={{ background:C.surface, borderRadius:12, padding:"14px",
        border:`1px solid ${C.border}` }}>
        <div style={{ fontSize:11, fontWeight:700, color:C.muted,
          textTransform:"uppercase", letterSpacing:"0.08em",
          fontFamily:"Inter,sans-serif", marginBottom:12 }}>
          Most Cooked Cuisines
        </div>
        {topCuisines.map(([cuisine, count], i)=>{
          const pct = count/maxFreq*100;
          const cols = [C.accent, C.green, C.accent, C.green, C.muted, C.muted];
          return (
            <div key={cuisine} style={{ marginBottom:i<5?9:0 }}>
              <div style={{ display:"flex", justifyContent:"space-between",
                marginBottom:3 }}>
                <span style={{ fontSize:12, color:i<2?C.text:C.muted,
                  fontFamily:"Inter,sans-serif",

                <span style={{ fontSize:11, fontWeight:700, color:cols[i],

                  {count}×</span>

                <div style={{ height:"100%", background:cols[i], borderRadius:3,
                  width:`${pct}%`, opacity:i<2?1:0.55 }}/>

// ── CALORIE TRACKER SCREEN ────────────────────────────────────────────────────
function CalorieTrackerScreen({ calorieGoal, C }) {
  const GOAL = calorieGoal || 2200;
  const [view, setView] = React.useState("today"); // "today" | "week" | "trends"
  const [log, setLog] = React.useState(()=>{
    try {
      const saved = JSON.parse(localStorage.getItem("mise_meal_log")||"null");
      if (saved && saved.date === new Date().toDateString()) return saved.entries;
    } catch(e) {}
    return [
      {id:1,meal:"Breakfast",name:"Oat porridge with banana",calories:380,protein:12,carbs:68,fat:8,time:"08:15"},
      {id:2,meal:"Lunch",name:"Chicken & rice bowl",calories:560,protein:42,carbs:64,fat:12,time:"12:30"},
    ];
  });

  // Persist log on every change (today only)
  React.useEffect(()=>{
    localStorage.setItem("mise_meal_log", JSON.stringify({
      date: new Date().toDateString(),
      entries: log,
    }));
  }, [log]);
  const [showAdd, setShowAdd] = React.useState(false);
  const [addMode, setAddMode] = React.useState("manual");
  const [addMeal, setAddMeal] = React.useState("Dinner");
  const [form, setForm] = React.useState({name:"",calories:"",protein:"",carbs:"",fat:""});
  const [aiRunning, setAiRunning] = React.useState(false);
  const [aiResult, setAiResult] = React.useState(null);

  const totals = log.reduce((acc,e)=>({
    calories:acc.calories+e.calories, protein:acc.protein+(e.protein||0),
    carbs:acc.carbs+(e.carbs||0), fat:acc.fat+(e.fat||0)
  }), {calories:0,protein:0,carbs:0,fat:0});

  const remaining = GOAL - totals.calories;
  const progress = Math.min(totals.calories/GOAL, 1);
  const MEALS_LIST = ["Breakfast","Lunch","Dinner","Snacks"];
  const R=44, circ=2*Math.PI*R, dash=circ*progress;
  const isOver = remaining < 0;

  // ── Simulated week history ─────────────────────────────────────────────────
  const WEEK_DATA = React.useMemo(() => [
    { day:"Mon", kcal:1840, protein:92,  carbs:215, fat:58 },
    { day:"Tue", kcal:2280, protein:118, carbs:264, fat:72 },
    { day:"Wed", kcal:1960, protein:108, carbs:238, fat:63 },
    { day:"Thu", kcal:2140, protein:115, carbs:252, fat:69 },
    { day:"Fri", kcal:2380, protein:105, carbs:288, fat:78 },
    { day:"Sat", kcal:1720, protein:86,  carbs:202, fat:54 },
    { day:"Today", kcal:totals.calories||null, protein:totals.protein, carbs:totals.carbs, fat:totals.fat },
  ], [totals.calories, totals.protein, totals.carbs, totals.fat]);

  const weekTotals = React.useMemo(() => {
    const days = WEEK_DATA.filter(d=>d.kcal);
    if (!days.length) return null;
    return {
      count: days.length,
      kcal:  Math.round(days.reduce((a,d)=>a+d.kcal,0)/days.length),

            </div>

function HealthIntegrations({ C, calorieGoal, setCalorieGoal }) {
  const [connections, setConnections] = React.useState(()=>JSON.parse(localStorage.getItem("mise_health_connections")||"{}"));
  const [syncData, setSyncData] = React.useState(()=>JSON.parse(localStorage.getItem("mise_health_data")||"{}"));
  const [connecting, setConnecting] = React.useState(null);
  const [adjustBanner, setAdjustBanner] = React.useState(null);

  function save(c,d) {
    localStorage.setItem("mise_health_connections",JSON.stringify(c));
    localStorage.setItem("mise_health_data",JSON.stringify(d));
  }
  function handleConnect(service) {
    setConnecting(service.id);
    setTimeout(()=>{
      const now = new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
      const data = {...service.sampleData, lastSync:now};
      const newConn={...connections,[service.id]:true};
      const newData={...syncData,[service.id]:data};
      setConnections(newConn); setSyncData(newData); setConnecting(null); save(newConn,newData);
      const adjusted = data.bmr + data.activeKcal;
      if (adjusted !== calorieGoal) setAdjustBanner({service:service.name,from:calorieGoal,to:adjusted,serviceId:service.id});
    }, 1400);
  }
  function handleDisconnect(serviceId) {
    const newConn={...connections}; delete newConn[serviceId];
    const newData={...syncData}; delete newData[serviceId];
    setConnections(newConn); setSyncData(newData); save(newConn,newData);
    if(adjustBanner?.serviceId===serviceId) setAdjustBanner(null);
  }
  function handleSync(service) {
    const now = new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
    const updated={...syncData[service.id],lastSync:now,
      steps:service.sampleData.steps+Math.floor(Math.random()*1000-500),
      activeKcal:service.sampleData.activeKcal+Math.floor(Math.random()*80-40)};
    const newData={...syncData,[service.id]:updated};
    setSyncData(newData); save(connections,newData);
    setAdjustBanner({service:service.name,from:calorieGoal,to:updated.bmr+updated.activeKcal,serviceId:service.id});
  }

  const connectedCount = Object.keys(connections).filter(k=>connections[k]).length;

  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
        <div style={{ fontSize:11, fontWeight:700, color:C.muted, textTransform:"uppercase",
          letterSpacing:"0.1em", fontFamily:"Inter,sans-serif" }}>Health &amp; Activity</div>
        {connectedCount>0&&(
          <div style={{ background:`${C.green}18`, border:`1px solid ${C.green}44`,
            borderRadius:20, padding:"3px 10px" }}>
            <span style={{ fontSize:10, fontWeight:700, color:C.green,
              fontFamily:"Inter,sans-serif" }}>{connectedCount} connected</span>
          </div>
        )}
      </div>
      <div style={{ height:1.5, background:C.green, opacity:0.35, marginBottom:12, borderRadius:1 }}/>
      {adjustBanner&&(
        <div style={{ background:`${C.green}18`, border:`1px solid ${C.green}55`,
          borderRadius:10, padding:"12px 14px", marginBottom:12 }}>
          <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
            <span style={{ fontSize:16, flexShrink:0 }}>💡</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:12, fontWeight:700, color:C.text,
                fontFamily:"'Nunito Sans',sans-serif", marginBottom:3 }}>Goal adjustment suggested</div>
              <div style={{ fontSize:11, color:C.muted, fontFamily:"Inter,sans-serif",
                lineHeight:1.5, marginBottom:10 }}>
                Based on {adjustBanner.service} activity today, your TDEE is{" "}
                <strong style={{ color:C.green }}>{adjustBanner.to} kcal</strong>{" "}(was {adjustBanner.from} kcal).
              </div>
              <div style={{ display:"flex", gap:7 }}>
                <button onClick={()=>{setCalorieGoal(adjustBanner.to);setAdjustBanner(null);}}
                  style={{ flex:1, padding:"7px", borderRadius:7, background:C.green,
                    border:"none", color:"#1C2333", fontSize:11, fontWeight:800,
                    cursor:"pointer", fontFamily:"'Nunito Sans',sans-serif" }}>
                  Update to {adjustBanner.to}
                </button>
                <button onClick={()=>setAdjustBanner(null)} style={{ padding:"7px 12px",
                  borderRadius:7, background:"transparent", border:`1px solid ${C.border}`,
                  color:C.muted, fontSize:11, cursor:"pointer", fontFamily:"Inter,sans-serif" }}>
                  Keep {adjustBanner.from}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
      {HEALTH_SERVICES.map(service=>(
        <HealthServiceCard key={service.id} service={service}
          connected={!!connections[service.id]} connecting={connecting===service.id}
          syncData={syncData[service.id]} onConnect={handleConnect}
          onDisconnect={()=>handleDisconnect(service.id)} onSync={handleSync} C={C}/>
      ))}
      <div style={{ padding:"10px 14px", background:C.surface, borderRadius:10,
        border:`1px solid ${C.border}` }}>
        <div style={{ fontSize:10, color:C.muted, fontFamily:"Inter,sans-serif", lineHeight:1.6 }}>
          🔒 <strong style={{ color:C.text }}>Your data stays private.</strong>{" "}
          Mise only reads activity summaries — no personal health records are stored on our servers.
        </div>
      </div>
    </div>
  );
}

          background:C.surface, borderRadius:12, padding:"14px 16px", border:`1px solid ${C.border}` }}>

            border:`2px solid ${C.accent}`, display:"flex", alignItems:"center", justifyContent:"center" }}>

            <div style={{ fontFamily:"'Nunito Sans',sans-serif", fontWeight:800,
              fontSize:16, color:C.text }}>Matthew Farmer</div>
            <div style={{ fontSize:12, color:C.muted, marginTop:2, fontFamily:"Inter,sans-serif" }}>
              mattdavfar@gmail.com</div>
            <div style={{ fontSize:10, color:C.accent, marginTop:3, fontWeight:700,
              fontFamily:"Inter,sans-serif", textTransform:"uppercase", letterSpacing:"0.06em" }}>

        </div>

        {/* ── CALORIE GOAL ── */}
        <div style={{ marginBottom:18 }}>
          <SectionHeader title="Calorie Goal"/>
          <div style={{ background:C.surface, borderRadius:12, padding:"14px",
            border:`1px solid ${C.border}`, marginBottom:8, marginTop:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end",
              marginBottom:editGoal?12:0 }}>
              <div>
                <div style={{ fontSize:9, fontWeight:700, color:C.muted, textTransform:"uppercase",
                  letterSpacing:"0.08em", fontFamily:"Inter,sans-serif", marginBottom:2 }}>Daily Target</div>

                  fontSize:30, color:C.accent, lineHeight:1 }}>{calorieGoal}</div>
